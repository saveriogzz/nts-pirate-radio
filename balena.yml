name: nts-radio
type: sw.application
description: >-
  Stream NTS Radio on a Raspberry Pi Zero 2W with Pimoroni Pirate Audio.
  Supports live channels and infinite mixtapes.
version: "0.3.0"
assets:
  repository:
    type: blob.asset
    data:
      url: "https://github.com/saveriogzz/nts-balena"
  logo:
    type: blob.asset
    data:
      url: "https://raw.githubusercontent.com/saveriogzz/nts-balena/main/logo.png"
post-provisioning: |
  ## Usage

  Attach a [Pimoroni Pirate Audio](https://shop.pimoroni.com/products/pirate-audio-line-out)
  HAT to the Pi's 40-pin header before powering on. On first boot the device
  downloads the app, then starts playing NTS channel 1 automatically.

  | Button | Playing | Menu |
  |--------|---------|------|
  | A (top-left) | Previous channel/mixtape | Scroll up |
  | B (bottom-left) | Next channel/mixtape | Scroll down |
  | X (top-right) | Play/Pause | Select |
  | Y (bottom-right) | Open menu | Back |

  Defaults can be overridden with the `NTS_DEFAULT_CHANNEL`,
  `NTS_DISPLAY_BRIGHTNESS`, and `NTS_BUTTON_DEBOUNCE_MS` environment
  variables in the dashboard.
data:
  defaultDeviceType: "raspberrypi0-2w-64"
  supportedDeviceTypes:
    - "raspberrypi0-2w-64"
    - "raspberry-pi2"
    - "raspberrypi3"
    - "raspberrypi3-64"
    - "raspberrypi4-64"
    - "raspberrypi5"
  applicationConfigVariables:
    - RESIN_HOST_CONFIG_dtparam: '"i2c_arm=on","spi=on","audio=off"'
    - RESIN_HOST_CONFIG_dtoverlay: '"vc4-kms-v3d,cma-320","hifiberry-dac"'
    - RESIN_HOST_CONFIG_gpio: '"25=op,dh"'
  applicationEnvironmentVariables:
    - NTS_DEFAULT_CHANNEL: 1
    - NTS_DISPLAY_BRIGHTNESS: 80
    - NTS_BUTTON_DEBOUNCE_MS: 200
